<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smartsteps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smartsteps</title>
  <link rel="manifest" href="manifest.json">

  <!-- GA4_SCRIPT_PLACEHOLDER -->

  <!-- Google Sign-In JS bridge -->
  <script>
    window.triggerGoogleSignIn = function() {
      // Find the GSI iframe button rendered by flutter google_sign_in_web
      var iframe = document.querySelector('iframe[src*="accounts.google.com"]');
      if (iframe) {
        // Try clicking inside the iframe's document
        try {
          iframe.contentDocument.querySelector('div[role="button"]').click();
        } catch(e) {
          // Cross-origin fallback: click the iframe container element
          iframe.click();
        }
        return true;
      }
      // If no iframe found, GSI not ready yet
      return false;
    };
  </script>

  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    if (!isLocalhost) {
      ['/_vercel/insights/script.js', '/_vercel/speed-insights/script.js'].forEach((src) => {
        const script = document.createElement('script');
        script.src = src;
        script.defer = true;
        document.head.appendChild(script);
      });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
